<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="30%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1A0A3B"/>
      <stop offset="50%"  stop-color="#080814"/>
      <stop offset="100%" stop-color="#05050E"/>
    </radialGradient>
    <!-- Logo helix strand 1 -->
    <linearGradient id="og-s1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#67E8F9"/>
      <stop offset="50%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Logo helix strand 2 -->
    <linearGradient id="og-s2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#22C55E"/>
      <stop offset="50%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- SPAWN text gradient -->
    <linearGradient id="og-spawn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#67E8F9"/>
      <stop offset="70%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <!-- Clinical text gradient -->
    <linearGradient id="og-clin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Tagline gradient -->
    <linearGradient id="og-tag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Lens flare -->
    <radialGradient id="og-flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#67E8F9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="og-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle text glow -->
    <filter id="og-tglow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Purple glow blob -->
    <radialGradient id="og-blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="320" cy="315" rx="380" ry="320" fill="url(#og-blob1)"/>
  <ellipse cx="900" cy="200" rx="280" ry="240" fill="url(#og-blob2)"/>

  <!-- Decorative grid lines (subtle) -->
  <g stroke="#67E8F9" stroke-width="0.5" opacity="0.06">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="rgba(124,58,237,0.3)" stroke-width="1" rx="16"/>
  <rect x="26" y="26" width="1148" height="578" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="0.5" rx="15"/>

  <!-- ── DNA HELIX (left side, large decorative) ── -->
  <g transform="translate(80, 90) scale(1.85)">
    <!-- HUD rings -->
    <circle cx="50" cy="45" r="40" fill="none" stroke="#06B6D4" stroke-width="0.8" opacity="0.25"/>
    <circle cx="50" cy="45" r="31" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.15"/>
    <!-- Scan lines -->
    <g opacity="0.12" stroke="#67E8F9" stroke-width="0.7">
      <line x1="16" y1="22" x2="84" y2="22"/>
      <line x1="12" y1="34" x2="88" y2="34"/>
      <line x1="12" y1="56" x2="88" y2="56"/>
      <line x1="16" y1="68" x2="84" y2="68"/>
    </g>
    <!-- Strand 2 (back) -->
    <path d="M 50,3 C 31,3 31,31 50,31 C 69,31 69,59 50,59 C 31,59 31,87 50,87"
      fill="none" stroke="url(#og-s2)" stroke-width="3" stroke-linecap="round" opacity="0.5" filter="url(#og-glow)"/>
    <!-- Rungs -->
    <g stroke="#06B6D4" stroke-width="1.4" stroke-linecap="round" opacity="0.8" filter="url(#og-glow)">
      <line x1="36" y1="17" x2="64" y2="17"/>
      <line x1="36" y1="45" x2="64" y2="45"/>
      <line x1="36" y1="73" x2="64" y2="73"/>
    </g>
    <!-- Strand 1 (front) -->
    <path d="M 50,3 C 69,3 69,31 50,31 C 31,31 31,59 50,59 C 69,59 69,87 50,87"
      fill="none" stroke="url(#og-s1)" stroke-width="3" stroke-linecap="round" filter="url(#og-glow)"/>
    <!-- Node dots -->
    <g fill="#06B6D4" filter="url(#og-glow)">
      <circle cx="50" cy="3"  r="3"   opacity="0.7"/>
      <circle cx="50" cy="31" r="4"/>
      <circle cx="50" cy="59" r="4"/>
      <circle cx="50" cy="87" r="3"   opacity="0.7"/>
    </g>
    <!-- Rung ends -->
    <g fill="#22C55E" opacity="0.9">
      <circle cx="36" cy="17" r="2.5"/><circle cx="64" cy="17" r="2.5"/>
      <circle cx="36" cy="45" r="2.5"/><circle cx="64" cy="45" r="2.5"/>
      <circle cx="36" cy="73" r="2.5"/><circle cx="64" cy="73" r="2.5"/>
    </g>
    <!-- Lens flare -->
    <circle cx="50" cy="45" r="12" fill="url(#og-flare)" opacity="0.8"/>
    <circle cx="50" cy="45" r="3.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- ── MAIN TEXT ── -->
  <!-- SPAWN wordmark -->
  <text x="310" y="262"
    font-family="Orbitron, monospace" font-weight="900" font-size="148"
    letter-spacing="6" fill="url(#og-spawn)" filter="url(#og-tglow)">SPAWN</text>

  <!-- Clinical -->
  <text x="314" y="336"
    font-family="Orbitron, monospace" font-weight="400" font-size="74"
    letter-spacing="2" fill="url(#og-clin)">Clinical</text>

  <!-- Divider line -->
  <line x1="312" y1="368" x2="1160" y2="368" stroke="rgba(124,58,237,0.35)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="314" y="418"
    font-family="Inter, Arial, sans-serif" font-weight="300" font-size="28"
    letter-spacing="1" fill="url(#og-tag)" opacity="0.9">The world's most advanced AI-powered eClinical platform</text>

  <!-- Sub tagline -->
  <text x="315" y="462"
    font-family="Inter, Arial, sans-serif" font-weight="400" font-size="22"
    fill="#94A3B8" opacity="0.8">Spawn your custom clinical trial solution in seconds</text>

  <!-- Persona badges -->
  <g transform="translate(314, 500)">
    <!-- Sponsor badge -->
    <rect width="160" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="80" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="14" fill="#A78BFA">💼 Sponsor</text>
    <!-- Site badge -->
    <rect x="176" width="130" height="40" rx="20" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
    <text x="241" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="14" fill="#67E8F9">🏥 Site</text>
    <!-- Patient badge -->
    <rect x="322" width="148" height="40" rx="20" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
    <text x="396" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="14" fill="#86EFAC">🧬 Patient</text>
  </g>

  <!-- URL watermark -->
  <text x="1172" y="600"
    text-anchor="end"
    font-family="Orbitron, monospace" font-weight="400" font-size="16"
    fill="#475569" letter-spacing="1">spawnclinical.com</text>
</svg>
