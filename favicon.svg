<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fv-s1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="fv-s2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="fv-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080814"/>
      <stop offset="100%" stop-color="#05050E"/>
    </radialGradient>
    <radialGradient id="fv-flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#67E8F9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="fv-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#fv-bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#06B6D4" stroke-width="0.4" opacity="0.25"/>

  <!-- DNA Strand 2 — back (dimmer, opposite phase) -->
  <!-- Crossings at y=2 and y=30; period=28px; 1 full period -->
  <path d="M 16,2 C 9,2 9,16 16,16 C 23,16 23,30 16,30"
    fill="none" stroke="url(#fv-s2)" stroke-width="1.8"
    stroke-linecap="round" opacity="0.5" filter="url(#fv-glow)"/>

  <!-- Crossbar rungs -->
  <!-- At t=0.5 of seg1: strand1≈(21,9), strand2≈(11,9) -->
  <!-- At t=0.5 of seg2: strand1≈(11,23), strand2≈(21,23) -->
  <g stroke="#06B6D4" stroke-width="1.1" stroke-linecap="round" opacity="0.85">
    <line x1="11" y1="9"  x2="21" y2="9"/>
    <line x1="11" y1="23" x2="21" y2="23"/>
  </g>

  <!-- DNA Strand 1 — front (bright) -->
  <path d="M 16,2 C 23,2 23,16 16,16 C 9,16 9,30 16,30"
    fill="none" stroke="url(#fv-s1)" stroke-width="1.8"
    stroke-linecap="round" filter="url(#fv-glow)"/>

  <!-- Crossing-point dots -->
  <circle cx="16" cy="2"  r="1.6" fill="#67E8F9" opacity="0.8"/>
  <circle cx="16" cy="30" r="1.6" fill="#22C55E" opacity="0.8"/>
  <circle cx="16" cy="16" r="2.2" fill="#06B6D4"/>

  <!-- Rung-end dots -->
  <g fill="#22C55E" opacity="0.85">
    <circle cx="21" cy="9"  r="1.3"/>
    <circle cx="11" cy="9"  r="1.3"/>
    <circle cx="11" cy="23" r="1.3"/>
    <circle cx="21" cy="23" r="1.3"/>
  </g>

  <!-- Lens flare at center crossing -->
  <circle cx="16" cy="16" r="4" fill="url(#fv-flare)"/>
  <circle cx="16" cy="16" r="1.2" fill="#ffffff" opacity="0.7"/>
</svg>
